<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FoodStreet.Client</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <link rel="stylesheet" href="_content/FoodStreet.UI/lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="_content/FoodStreet.UI/css/app.css" />
    <link rel="stylesheet" href="_content/FoodStreet.UI/css/admin.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="FoodStreet.Client.styles.css" rel="stylesheet" />
    <!-- MapBox GL JS -->
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.js"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
    <style>
        .poi-marker.nearest .poi-marker-inner { font-size: 22px; }
        .nearest-glow {
            animation: nearestPulse 1.5s ease-in-out infinite;
            filter: drop-shadow(0 0 6px rgba(255, 107, 53, 0.8));
        }
        @keyframes nearestPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }
    </style>
    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_content/FoodStreet.UI/js/gps-tracking.js"></script>
    <script src="_content/FoodStreet.UI/js/mapbox-map.js"></script>
    <script src="_content/FoodStreet.UI/js/tts-service.js"></script>
    <script src="_content/FoodStreet.UI/js/push-notification.js"></script>
    <script src="_content/FoodStreet.UI/js/heatmap-helper.js"></script>
    <script src="_content/FoodStreet.UI/js/chart-helper.js"></script>
    <script src="_framework/blazor.webassembly.js"></script>
</body>

</html>

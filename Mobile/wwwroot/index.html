<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>FoodStreet.Mobile</title>
    <base href="/" />

    <!-- Shared UI Assets -->
    <link rel="stylesheet" href="_content/FoodStreet.UI/lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="_content/FoodStreet.UI/css/app.css" />
    <link rel="stylesheet" href="_content/FoodStreet.UI/css/admin.css" />
    <link href="_content/FoodStreet.UI/FoodStreet.UI.styles.css" rel="stylesheet" />

    <!-- Google Maps JS remains only for fallback/shared WebView pages. -->
</head>

<body>

    <div class="status-bar-safe-area"></div>

    <div id="app">Loading...</div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>

    <!-- Blazor WebView MUST load first with autostart="false" in MAUI -->
    <script src="_framework/blazor.webview.js" autostart="false"></script>

    <!-- CDN Scripts: Chart.js -->
    <!-- Google Maps JS is injected dynamically only when a fallback/shared page still needs it. -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js" async></script>

    <!-- Local Scripts (these load from APK, always available) -->
    <script src="_content/FoodStreet.UI/js/gps-tracking.js"></script>
    <script src="runtime-config.js?v=20260403-2"></script>
    <script src="_content/FoodStreet.UI/js/google-maps-helper.js"></script>
    <script src="_content/FoodStreet.UI/js/tts-service.js"></script>
    <script src="_content/FoodStreet.UI/js/push-notification.js"></script>
    <script src="_content/FoodStreet.UI/js/heatmap-helper.js"></script>
    <script src="_content/FoodStreet.UI/js/chart-helper.js"></script>

</body>

</html>
